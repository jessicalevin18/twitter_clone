name: start_services
on:
  push:
  pull_request:

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start dev services
        run: docker compose up -d --build
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker compose exec -T pg_normalized pg_isready -U postgres; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 2
          done
      - name: Check services running
        run: |
          docker compose ps
          if docker compose ps | grep -E "Exit|exited"; then
            docker compose logs
            exit 1
          fi
          docker compose ps pg_normalized | grep -q "running\|Up"
          docker compose ps web | grep -q "running\|Up"
      - name: Test web responding
        run: curl --retry 5 --retry-delay 2 --retry-connrefused --fail http://localhost:1087
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start prod services
        run: docker compose -f docker-compose.prod.yml up -d --build
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.prod.yml exec -T pg_normalized pg_isready -U postgres; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 2
          done
      - name: Check services running
        run: |
          docker compose -f docker-compose.prod.yml ps
          if docker compose -f docker-compose.prod.yml ps | grep -E "Exit|exited"; then
            docker compose -f docker-compose.prod.yml logs
            exit 1
          fi
      - name: Test web responding
        run: curl --retry 5 --retry-delay 2 --retry-connrefused --fail http://localhost:1087
      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs
