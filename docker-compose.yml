version: '3.3'

services:
  pg_normalized:
    build: services/pg_normalized
    volumes:
      - ./:/tmp/db
      - pg_normalized:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass
      - PGUSER=postgres
    ports:
      - 24527:5432

  web:
    build: services/web
    depends_on:
      - pg_normalized
    ports:
      - 8000:8000
    environment:
      - PG_USER=postgres
      - PG_PASSWORD=pass
      - PG_HOST=pg_normalized
      - PG_PORT=5432
    volumes:
      - ./services/web:/app
    command: python main.py
    restart: always

volumes:
  pg_normalized:
